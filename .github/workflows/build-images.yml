name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image names (e.g. "grafana,k6,mimir")'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.discover.outputs.images }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        run: |
          if [[ -n "${{ inputs.images }}" ]]; then
            IFS=',' read -ra SPECIFIC <<< "${{ inputs.images }}"
            FOUND=()
            for img in "${SPECIFIC[@]}"; do
              img=$(echo "$img" | xargs)
              if [[ -f "${img}/Dockerfile" ]]; then
                FOUND+=("$img")
              else
                echo "Warning: no Dockerfile for '${img}', skipping"
              fi
            done
            JSON=$(printf '%s\n' "${FOUND[@]}" | jq -R . | jq -s .)
          else
            JSON=$(find . -maxdepth 2 -name 'Dockerfile' \
              -not -path './.github/*' \
              -exec dirname {} \; \
              | sort -u \
              | sed 's|^\./||' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "images=$JSON" >> "$GITHUB_OUTPUT"
          echo "Discovered: $JSON"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.images != '[]' && needs.discover.outputs.images != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-image
        with:
          image: ${{ matrix.image }}
