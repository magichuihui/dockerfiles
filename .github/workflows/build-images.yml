# =============================================================
# Build and Push Docker Images
# Supports multiple images — each subdirectory with a Dockerfile
# is auto-discovered and built as a separate image.
# =============================================================
name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly rebuild to pick up security patches — every Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image names to build (e.g. "grafana,mimir"). Leave empty to build all.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Discover all image directories containing a Dockerfile
  # -----------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.discover.outputs.images }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        run: |
          if [[ -n "${{ inputs.images }}" ]]; then
            # manual trigger with specific images
            IFS=',' read -ra SPECIFIC <<< "${{ inputs.images }}"
            FOUND=()
            for img in "${SPECIFIC[@]}"; do
              img=$(echo "$img" | xargs)  # trim
              if [[ -f "${img}/Dockerfile" ]]; then
                FOUND+=("$img")
              else
                echo "⚠️  Warning: no Dockerfile found for '${img}', skipping"
              fi
            done
            JSON=$(printf '%s\n' "${FOUND[@]}" | jq -R . | jq -s .)
          else
            # auto-discover directories with Dockerfiles
            JSON=$(find . -maxdepth 2 -name 'Dockerfile' \
              -not -path './.github/*' \
              -exec dirname {} \; \
              | sort -u \
              | sed 's|^\./||' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "images=$JSON" >> "$GITHUB_OUTPUT"
          echo "Discovered: $JSON"

  # -----------------------------------------------------------
  # Build each discovered image in parallel (matrix)
  # -----------------------------------------------------------
  build:
    needs: discover
    if: ${{ needs.discover.outputs.images != '[]' && needs.discover.outputs.images != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
      fail-fast: false  # one failure shouldn't cancel other images
    permissions:
      contents: read
      packages: write
      # id-token: write   # uncomment if you add cosign signing

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------
      # Extract Grafana version from Dockerfile to ensure alignment
      # -------------------------------------------------------
      - name: Extract Grafana version
        if: matrix.image == 'grafana'
        id: grafana-version
        run: |
          FULL_VERSION=$(grep '^ARG GRAFANA_VERSION=' grafana/Dockerfile | cut -d= -f2)
          # Proper URL-encode for GitHub archive URL (handles +, spaces, etc.)
          ENCODED_VERSION=$(echo -n "$FULL_VERSION" | jq -sRr @uri)
          # Sanitize for Docker tag: replace + with -
          SAFE_TAG=$(echo "$FULL_VERSION" | tr '+' '-')
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "encoded-version=$ENCODED_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe-tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "Grafana: $FULL_VERSION (encoded: $ENCODED_VERSION, tag: $SAFE_TAG)"

      # -------------------------------------------------------
      # Compile binary from source (grafana only) — avoids Docker
      # writable-layer disk exhaustion during Go compilation
      # -------------------------------------------------------
      - name: Set up Go
        if: matrix.image == 'grafana'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Build Grafana binary from source (patched deps, newer Go)
        if: matrix.image == 'grafana'
        run: |
          set -eux
          GRAFANA_VERSION="${{ steps.grafana-version.outputs.version }}"
          ENCODED_VERSION="${{ steps.grafana-version.outputs.encoded-version }}"
          mkdir -p grafana-src && curl -fsSL \
            "https://github.com/grafana/grafana/archive/refs/tags/v${ENCODED_VERSION}.tar.gz" \
            | tar xz --strip-components=1 -C grafana-src
          cd grafana-src
          GOWORK=off go mod download
          # Patch Go dependencies for known CVEs
          GOWORK=off go get github.com/jackc/pgx/v5@v5.9.0
          GOWORK=off go get github.com/apache/thrift@v0.23.0
          GOWORK=off go get go.opentelemetry.io/otel/sdk@v1.43.0
          GOWORK=off go get github.com/moby/moby@v29.3.1
          GOWORK=off go get github.com/prometheus/prometheus@v0.311.3
          GOWORK=off CGO_ENABLED=1 go build -p=1 -tags oss \
            -o "../grafana/grafana-server" ./pkg/cmd/grafana

      # -------------------------------------------------------
      # Set up Docker Buildx (multi-platform, caching, etc.)
      # -------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------
      # Log in to GitHub Container Registry
      # -------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Generate Docker tags and labels
      # -------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.grafana-version.outputs.safe-tag }},enable=${{ matrix.image == 'grafana' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
            type=schedule,pattern=weekly-{{date 'YYYYww'}}
          flavor: |
            latest=auto

      # -------------------------------------------------------
      # Build and push
      # -------------------------------------------------------
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # -------------------------------------------------------
      # Vulnerability scan (informational on push, gate on PR)
      # -------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: ${{ github.event_name == 'pull_request' && 1 || 0 }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      # -------------------------------------------------------
      # Output image digest (useful for downstream workflows)
      # -------------------------------------------------------
      - name: Output digest
        run: |
          echo "### ✅ ${{ matrix.image }} built successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
